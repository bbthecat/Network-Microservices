# ============================================================
# Nginx Main Configuration — Lab 7 Edge Gateway
# Role: Reverse Proxy + Load Balancer + ACL + Rate Limiting
# ============================================================

user  nginx;
worker_processes  auto;          # Auto-scale to CPU cores

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ──────────────────────────────────────────────────────
    # LOGGING — millisecond-precision timestamps
    # Format: JSON structured log for easy parsing by Loki
    # ──────────────────────────────────────────────────────
    log_format  json_combined escape=json
        '{'
          '"time_iso8601":"$time_iso8601",'
          '"msec":"$msec",'
          '"remote_addr":"$remote_addr",'
          '"request":"$request",'
          '"status":"$status",'
          '"body_bytes_sent":"$body_bytes_sent",'
          '"http_referer":"$http_referer",'
          '"http_user_agent":"$http_user_agent",'
          '"upstream_addr":"$upstream_addr",'
          '"upstream_response_time":"$upstream_response_time",'
          '"request_time":"$request_time"'
        '}';

    access_log  /var/log/nginx/access.log  json_combined;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # ──────────────────────────────────────────────────────
    # RATE LIMITING — Protect API from abuse
    # Zone: 10MB memory, 10 requests/sec per IP
    # ──────────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr  zone=api_limit:10m  rate=10r/s;
    limit_req_status 429;

    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_conn_status 503;

    # ──────────────────────────────────────────────────────
    # SECURITY HEADERS (Global)
    # ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"       always;
    add_header X-XSS-Protection          "1; mode=block"    always;
    add_header X-Content-Type-Options    "nosniff"          always;
    add_header Referrer-Policy           "strict-origin"    always;
    add_header X-Lab-Zone                "frontend-dmz"     always;
    server_tokens off;   # Hide Nginx version

    # ──────────────────────────────────────────────────────
    # UPSTREAM — App Tier Load Balancer
    # Strategy: least_conn (routes to least busy server)
    # ──────────────────────────────────────────────────────
    upstream api_cluster {
        least_conn;

        server api-1:3000 max_fails=3 fail_timeout=30s;
        server api-2:3000 max_fails=3 fail_timeout=30s backup;

        keepalive 32;
    }

    # Include virtual host configs
    include /etc/nginx/conf.d/*.conf;
}
