# ============================================================
# Nginx Virtual Host — Port 80 (Public HTTP)
# and Port 8000 (API Gateway Public Entry)
# ============================================================

# ──────────────────────────────────────────────────────────────
# ACL: Define allowed App Tier subnets (backend-secure zone)
# Only these IPs may reach internal services
# ──────────────────────────────────────────────────────────────
geo $is_backend_zone {
    default           0;
    172.21.0.0/24     1;   # backend-secure network — ALLOWED
    127.0.0.1         1;   # loopback — ALLOWED
}

geo $is_internal_admin {
    default           0;
    172.20.0.0/24     1;   # frontend-dmz admins
    172.21.0.0/24     1;   # backend services
    127.0.0.1         1;   # loopback
}

# ──────────────────────────────────────────────────────────────
# SERVER: Port 80 — Public HTTP → Redirect to API or serve status
# ──────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Health check endpoint — no rate limit, no auth
    location /health {
        access_log off;
        return 200 '{"status":"ok","gateway":"edge-nginx","zone":"frontend-dmz"}';
        add_header Content-Type application/json;
    }

    # Redirect all other traffic to port 8000 (API Gateway)
    location / {
        return 301 http://$host:8000$request_uri;
    }
}

# ──────────────────────────────────────────────────────────────
# SERVER: Port 8000 — API Gateway (Public Entry Point)
# - Rate Limited
# - Proxies to api_cluster upstream
# - Security hardened
# ──────────────────────────────────────────────────────────────
server {
    listen 8000;
    server_name _;

    # Connection limit per IP
    limit_conn conn_limit 20;

    # ── Health probe (internal + external, no limit) ──
    location = /health {
        access_log off;
        proxy_pass http://api_cluster/health;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_connect_timeout 3s;
        proxy_read_timeout    5s;
    }

    # ── Nginx own status (INTERNAL ONLY — ACL enforced) ──
    location = /nginx-status {
        stub_status on;
        deny  all;
        allow 172.21.0.0/24;
        allow 172.20.0.0/24;
        allow 127.0.0.1;
    }

    # ── Block direct database access (Firewall rule simulation) ──
    # Any request targeting DB ports / paths is dropped
    location ~ ^/(postgres|redis|db|database) {
        deny all;
        return 403 '{"error":"Access Denied","reason":"Database tier is private","zone":"backend-secure"}';
        add_header Content-Type application/json;
    }

    # ── Admin routes — restricted to internal networks ──
    location /admin {
        if ($is_internal_admin = 0) {
            return 403 '{"error":"Forbidden","reason":"Admin access requires internal network"}';
        }

        limit_req zone=api_limit burst=5 nodelay;

        proxy_pass http://api_cluster;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Lab-Node        $upstream_addr;
    }

    # ── Main API — Rate limited, proxied to App Tier ──
    location / {
        # Rate limiting: 10 req/s, burst up to 20 requests, no delay
        limit_req zone=api_limit burst=20 nodelay;

        # Proxy to upstream cluster
        proxy_pass http://api_cluster;

        # Proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Lab-Node        $upstream_addr;

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        # Buffering for performance
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;

        # Pass upstream errors back to client
        proxy_intercept_errors off;

        # Retry on failure (Failover support)
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    # ── Custom error pages ──
    error_page 429 /429.json;
    location = /429.json {
        internal;
        return 429 '{"error":"Rate Limit Exceeded","retry_after":"1s","zone":"frontend-dmz"}';
        add_header Content-Type application/json;
        add_header Retry-After 1;
    }

    error_page 502 503 504 /5xx.json;
    location = /5xx.json {
        internal;
        return 503 '{"error":"Service Unavailable","message":"All upstream nodes are down","zone":"frontend-dmz"}';
        add_header Content-Type application/json;
    }
}
