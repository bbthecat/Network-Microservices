server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

scrape_configs:
  # ── Scrape ALL Docker container logs ──
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: status
            values: ["running"]
    relabel_configs:
      # Use container name as label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      # Use compose service as label
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      # Network zone label
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'project'
      # Append log zone based on container network
      - source_labels: ['__meta_docker_container_label_com_docker_network_lab7_frontend_dmz']
        target_label: 'zone_dmz'
      - source_labels: ['__meta_docker_container_label_com_docker_network_lab7_backend_secure']
        target_label: 'zone_backend'

    pipeline_stages:
      # Parse JSON logs (from Nginx json_combined format)
      - json:
          expressions:
            time_iso8601: time_iso8601
            msec: msec
            remote_addr: remote_addr
            status: status
            request: request
            upstream_addr: upstream_addr
            request_time: request_time

      # Use millisecond timestamp from log if available
      - timestamp:
          source: msec
          format: Unix
          fallback_formats:
            - UnixMs
            - RFC3339Nano

      # Add static labels
      - static_labels:
          lab: "lab7"
          environment: "simulation"

      # Output final log entry
      - output:
          source: message
