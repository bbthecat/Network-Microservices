apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceName: Loki
          matcherRegex: '"upstream_addr":"([^"]+)"'
          name: UpstreamNode
          url: '$${__value.raw}'
    editable: false
