version: '3.9'

# ============================================================
# Network & Microservices Lab 7 - Docker Compose Topology
# Simulates: Edge Gateway → App Tier → Data Tier
# Replaces: Packet Tracer / Physical Router topology
# ============================================================

networks:
  # DMZ zone — exposed to the "internet" (host traffic)
  frontend-dmz:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

  # Secure backend zone — no direct external access
  backend-secure:
    driver: bridge
    internal: true       # ← No outbound internet from this network
    ipam:
      config:
        - subnet: 172.21.0.0/24

volumes:
  postgres_data:
  redis_data:
  loki_data:
  grafana_data:

services:

  # ──────────────────────────────────────────────────────────
  # EDGE GATEWAY — Nginx Reverse Proxy + Load Balancer
  # Zone: frontend-dmz (public-facing)
  # ──────────────────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: lab7-nginx
    hostname: edge-gateway
    ports:
      - "80:80"
      - "8000:8000"
    networks:
      frontend-dmz:
        ipv4_address: 172.20.0.10
      backend-secure:
        ipv4_address: 172.21.0.10   # Proxy arm into secure zone
    depends_on:
      - api-1
      - api-2
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/logs:/var/log/nginx
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "nginx"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # APP TIER — API Service Instance 1 (Primary)
  # Zone: backend-secure only (no direct external access)
  # ──────────────────────────────────────────────────────────
  api-1:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: lab7-api-1
    hostname: api-node-01
    environment:
      - NODE_ID=api-1
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-labdb}
      - DB_USER=${POSTGRES_USER:-labuser}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-Lab7S3cure!}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-Redis7S3cure!}
      - LOG_LEVEL=debug
    networks:
      backend-secure:
        ipv4_address: 172.21.0.21
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "api-1"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # APP TIER — API Service Instance 2 (Replica / Failover)
  # ──────────────────────────────────────────────────────────
  api-2:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: lab7-api-2
    hostname: api-node-02
    environment:
      - NODE_ID=api-2
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-labdb}
      - DB_USER=${POSTGRES_USER:-labuser}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-Lab7S3cure!}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-Redis7S3cure!}
      - LOG_LEVEL=debug
    networks:
      backend-secure:
        ipv4_address: 172.21.0.22
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "api-2"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # DATA TIER — PostgreSQL Primary Database
  # Zone: backend-secure (fully private, not reachable from DMZ)
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lab7-postgres
    hostname: db-primary
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-labdb}
      - POSTGRES_USER=${POSTGRES_USER:-labuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-Lab7S3cure!}
      - POSTGRES_INITDB_ARGS=--auth-local=scram-sha-256
    networks:
      backend-secure:
        ipv4_address: 172.21.0.31
    expose:
      - "5432"           # NOT published to host — private only
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - ./db/logs:/var/log/postgresql
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "postgres"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-labuser} -d ${POSTGRES_DB:-labdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # DATA TIER — Redis Caching Layer
  # Zone: backend-secure
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lab7-redis
    hostname: cache-primary
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-Redis7S3cure!}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --loglevel notice
    networks:
      backend-secure:
        ipv4_address: 172.21.0.32
    expose:
      - "6379"           # NOT published to host — private only
    volumes:
      - redis_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "redis"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-Redis7S3cure!}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # LOGGING STACK — Loki (Log Aggregation)
  # Collects logs from all containers
  # ──────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.4
    container_name: lab7-loki
    hostname: log-aggregator
    ports:
      - "3100:3100"
    networks:
      backend-secure:
        ipv4_address: 172.21.0.41
    volumes:
      - ./nginx/conf.d/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # LOGGING STACK — Promtail (Log Shipper)
  # Ships Docker container logs to Loki
  # ──────────────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.4
    container_name: lab7-promtail
    hostname: log-shipper
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./nginx/conf.d/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    networks:
      backend-secure:
        ipv4_address: 172.21.0.42
    depends_on:
      - loki
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # LOGGING STACK — Grafana (Dashboard & Visualization)
  # ──────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.3
    container_name: lab7-grafana
    hostname: log-dashboard
    ports:
      - "3000:3000"
    networks:
      backend-secure:
        ipv4_address: 172.21.0.43
      frontend-dmz:
        ipv4_address: 172.20.0.43  # Accessible from DMZ for UI
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-GrafanaLab7!}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_LOG_MODE=console
      - GF_LOG_LEVEL=warn
    volumes:
      - grafana_data:/var/lib/grafana
      - ./nginx/conf.d/grafana-datasource.yml:/etc/grafana/provisioning/datasources/loki.yml:ro
    depends_on:
      - loki
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
